sources:
  - name: Dakshina
    description: Google Research dataset for South Asian language transliteration including Telugu
    tier: A
    license_tag: CC-BY-SA-4.0
    source_type: hf_dataset
    url_or_path: google-research/dakshina
    lang: te
    script_available: true
    notes: Primary source. Lexicon and wiki splits available.

  - name: ILCI_Corpus
    description: Indian Languages Corpora Initiative — parallel text corpus with Telugu coverage
    tier: B
    license_tag: CC-BY-NC-4.0
    source_type: manual
    url_or_path: https://tdil-dc.in/
    lang: te
    script_available: true
    notes: Tier B — keep source_doc_id and takedown pathway. Non-commercial only.

  - name: Aksharantar
    description: AI4Bharat transliteration dataset aggregating IndicCorp, Dakshina, Samanantar, and Wikidata — 2.4M Telugu word pairs
    tier: A
    license_tag: CC-BY-4.0
    source_type: hf_dataset
    url_or_path: https://huggingface.co/datasets/ai4bharat/Aksharantar/resolve/main/tel.zip
    lang: te
    script_available: true
    notes: Download tel.zip (~69MB). Already aggregates Dakshina, IndicCorp, Samanantar, Wikidata. Use IndicCorp score field for quality filtering.

  - name: Telugu_Wikipedia
    description: Telugu Wikipedia articles via Wikimedia HuggingFace dataset — sentence-level monolingual Telugu text
    tier: A
    license_tag: CC-BY-SA-3.0
    source_type: hf_dataset
    url_or_path: https://datasets-server.huggingface.co/rows?dataset=wikimedia%2Fwikipedia&config=20231101.te&split=train
    lang: te
    script_available: true
    notes: Sentence-level data — Roman forms generated in Phase 2 by romanize_rules.py. Pull via datasets-server pagination API.

  - name: Samanantar
    description: AI4Bharat parallel corpus — Telugu sentence side used for sentence-level training pairs. Added in Phase 4 after baseline showed 34% CER on long sentences.
    tier: B
    license_tag: CC-BY-NC-4.0
    source_type: hf_dataset
    url_or_path: ai4bharat/samanantar
    lang: te
    script_available: true
    notes: Pull Telugu (tgt) side only. Roman pairs generated by romanize_rules.py. Max 300k sentences sampled from 4.9M total. Takedown contact ai4bharat@iisc.ac.in.

  - name: Synthetic_Internal
    description: Team-generated synthetic Tenglish-Telugu pairs from deterministic romanization rules
    tier: A
    license_tag: internal
    source_type: manual
    url_or_path: data/synthetic/
    lang: te
    script_available: true
    notes: Generated by romanize_rules.py — no external IP involved.
